# Hardware topology for G6_2x10 (production arena_10-10 v1.1.7).
# Sibling to ../arenas/G6_2x10.yaml (geometry).
#
# STATUS: untested / unvalidated draft (2026-05-15).
# Values mirrored by hand from docs/development/g6_07-arena-firmware-interface.md
# § SPI region-to-bus mapping + § Pin assignments. Confirm against actual
# arena PCB net-trace before relying on this for bring-up.
#
# Schema documented in ./README.md.

arena: G6_2x10
hardware: arena_10-10_v1p1r7

spi_buses:
  - bus_id: 0
    name: B0
    cols: [0, 1, 2, 3, 4]      # P1..P5
  - bus_id: 1
    name: B1
    cols: [5, 6, 7, 8, 9]      # P6..P10

# Teensy silk-label pin numbers (0 = D0, 24 = D24, etc.). Four per column;
# list index = panel_row (0..3). The same Teensy GPIOs gate the corresponding
# column on each bus (col 0 ↔ col 5, col 1 ↔ col 6, …); bus separation
# prevents collision. For the 2-row G6_2x10 install, only indices 0..1 are
# populated; indices 2..3 are hardware headroom for a future G6_4x10.
cs_gpios_per_column:
  0: [0, 2, 3, 4]              # CS0..CS3 = D0, D2, D3, D4
  1: [5, 6, 7, 8]              # CS0..CS3 = D5, D6, D7, D8
  2: [9, 10, 24, 25]           # CS0..CS3 = D9, D10, D24, D25
  3: [28, 29, 30, 31]          # CS0..CS3 = D28, D29, D30, D31
  4: [32, 23, 22, 21]          # CS0..CS3 = D32, D23, D22, D21
  5: [0, 2, 3, 4]              # shares B0 col-0 Teensy pins; bus B1 separates
  6: [5, 6, 7, 8]
  7: [9, 10, 24, 25]
  8: [28, 29, 30, 31]
  9: [32, 23, 22, 21]
