# Minimal G4.1 Controller-Only Test Protocol
# No plugins - pure controller commands for hardware testing
# Short durations for quick test runs

version: 2

experiment_info:
  name: "G4.1 Controller-Only Test"
  date_created: "2026-02-11"
  author: "Test Suite"
  pattern_library: '/Users/lisaferguson/Documents/PC/Programming/Reiser/maDisplayTools/patterns/reference/G41_2x12_cw'

rig: 'maDisplayTools/configs/rigs/test_rig_1.yaml'  #UPDATE THIS BEFORE RUNNING

experiment_structure:
  repetitions: 2
  randomization:
    enabled: true
    seed: 42
    method: "block"

pretrial:
  include: true
  commands:
    - type: "controller"
      command_name: "allOn"

    - type: "wait"
      duration: 1

block:
  conditions:
    - id: "Sq Grating 30deg"
      commands:
        - type: "controller"
          command_name: "trialParams"
          pattern: 'pat01_sq_grating_30deg_gs2_G4.pat'
          pattern_ID: 1
          duration: 2
          mode: 2
          frame_index: 1
          frame_rate: 60
          gain: 0

    - id: "Sine Grating 30Deg"
      commands:
        - type: "controller"
          command_name: "trialParams"
          pattern: 'pat05_sine_grating_30deg_gs16_G4.pat'
          pattern_ID: 5
          duration: 1
          mode: 2
          frame_index: 1
          frame_rate: 60
          gain: 0

intertrial:
  include: true
  commands:
    - type: "wait"
      duration: 0.5

posttrial:
  include: true
  commands:
    - type: "controller"
      command_name: "allOff"

    - type: "wait"
      duration: 0.5
