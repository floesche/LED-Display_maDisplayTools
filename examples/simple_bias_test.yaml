# Test Protocol for BiasPlugin and LEDBacklightPlugin
# Uses dummy BiasControl class for testing without actual hardware

version: 2

experiment_info:
  name: "Test Bias Plugin"
  date_created: "2026-02-25"
  author: "Lisa"
  pattern_library: './patterns/reference/G41_2x12_cw'

rig: './configs/rigs/test_rig_1.yaml'  #REPLACE THIS BEFORE USE

# ============================================================================
# PLUGIN DEFINITIONS
# ============================================================================
plugins:
  # BIAS Camera Plugin
  - name: "camera"
    type: "class"
    matlab:
      class: "BiasPlugin"
    config:
      video_format: "avi"

# ============================================================================
# EXPERIMENT STRUCTURE
# ============================================================================
experiment_structure:
  repetitions: 1
  randomization:
    enabled: false 
    seed: null
    method: "block"

# ============================================================================
# PRETRIAL - Test plugin initialization
# ============================================================================
pretrial:
  include: false
  commands:
    - type: "wait"
      duration: 1
    
# ============================================================================
# BLOCK - Test camera commands during trials
# ============================================================================
block:
  conditions:
    - id: "Start recording"
      commands:
        # Test disable logging
        - type: "plugin"
          plugin_name: "camera"
          command_name: "startRecording"
          params:
            filename: 'bias_test'

        - type: "wait"
          duration: 10

        - type: "plugin"
          plugin_name: "camera"
          command_name: "stopRecording"

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "camera"
          command_name: "stopCapture"

    - id: "Start recording again"
      commands:
        # Test disable logging
        - type: "plugin"
          plugin_name: "camera"
          command_name: "startRecording"
          params:
            filename: 'bias_test2'

        - type: "wait"
          duration: 10

        - type: "plugin"
          plugin_name: "camera"
          command_name: "stopRecording"

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "camera"
          command_name: "stopCapture"



# ============================================================================
# INTERTRIAL - Test timestamp logging
# ============================================================================
intertrial:
  include: true
  commands:
    # Test getTimestamp command
    - type: "plugin"
      plugin_name: "camera"
      command_name: "getTimestamp" #UNSURE IF THIS COMMAND IS AVAILABLE IN BIASCONTROL - IF NOT, DISABLE INTERTRIAL
   

# ============================================================================
# POSTTRIAL - Test cleanup
# ============================================================================
posttrial:
  include: true
  commands:
    # Final timestamp
    - type: "plugin"
      plugin_name: "camera"
      command_name: "getTimestamp" #UNSURE IF THIS COMMAND IS AVAILABLE IN BIASCONTROL - IF NOT, DISABLE POSTTRIAL
