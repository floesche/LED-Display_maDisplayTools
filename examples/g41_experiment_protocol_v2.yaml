# Protocol Version 1 - G4.1 Experiment Patterns (16 conditions)
#
# Plays all 16 experiment patterns sequentially using Lisa's ProtocolRunner.
# Each condition runs for 10 seconds in Mode 2 at 10 fps.
#
# Prerequisites:
#   1. Run create_g41_experiment_patterns.m to generate patterns
#   2. Run prepare_g41_experiment_sd.m to stage/copy to SD card
#   3. Insert SD card into controller
#
# Usage (from project root):
#   run_protocol('examples/g41_experiment_protocol_v1.yaml', '10.102.40.209')
#   run_protocol('examples/g41_experiment_protocol_v1.yaml', '10.102.40.209', 'DryRun', true)

version: 2

# ============================================================================
# EXPERIMENT METADATA
# ============================================================================
experiment_info:
  name: "G4.1 Experiment Patterns - 16 Pattern Checkout"
  date_created: "2026-02-25"
  author: "Reiser Lab"
  pattern_library: 'path/to/library'

# ============================================================================
# ARENA CONFIGURATION
# ============================================================================
rig: './configs/rigs/test_rig_1.yaml'  # UPDATE THIS TO FULL PATH BEFORE USE

# ============================================================================
# EXPERIMENT STRUCTURE
# ============================================================================
experiment_structure:
  repetitions: 1
  randomization:
    enabled: false
    seed: null
    method: "block"

# ============================================================================
# PRETRIAL - Sanity check: all panels ON briefly
# ============================================================================
pretrial:
  include: true
  commands:
    - type: "controller"
      command_name: "allOn"

    - type: "wait"
      duration: 1

    - type: "controller"
      command_name: "allOff"

    - type: "wait"
      duration: 0.5

# ============================================================================
# BLOCK - 16 experiment pattern conditions
# ============================================================================
block:
  conditions:
    # --- GRATINGS ---

    - id: "sq_grating_30deg_gs2"
      commands:
        - type: "controller"
          command_name: "trialParams"
          pattern: "pat0001.pat"
          pattern_ID: 1
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

    - id: "sq_grating_30deg_gs16"
      commands:
