# Test Protocol for BiasPlugin and LEDBacklightPlugin
# Uses dummy BiasControl class for testing without actual hardware

version: 1

experiment_info:
  name: "Test Bias Plugin"
  date_created: "2026-02-25"
  author: "Lisa"
  pattern_library: '/Users/lisaferguson/Documents/PC/Programming/Reiser/maDisplayTools/examples/SimpleYamlExperimentDemo'

arena_info:
  num_rows: 2
  num_cols: 12
  generation: "G4.1"

# ============================================================================
# PLUGIN DEFINITIONS
# ============================================================================
plugins:
  # BIAS Camera Plugin
  - name: "bias_camera"
    type: "class"
    matlab:
      class: "BiasPlugin"
    config:
      bias_executable: 'C:\matlabroot\FlyBowl1Rig\bias_spinnaker\test_gui.exe'  # UPDATE THIS BEFORE RUNNING IF NEEDED
      ip: "10.102.40.61"
      port: 62222
      config_path: 'C:\matlabroot\FlyBowl1Rig\bias_config_default1.json'

# ============================================================================
# EXPERIMENT STRUCTURE
# ============================================================================
experiment_structure:
  repetitions: 1
  randomization:
    enabled: false 
    seed: null
    method: "block"

# ============================================================================
# PRETRIAL - Test plugin initialization
# ============================================================================
pretrial:
  include: false
  commands:
    - type: "wait"
      duration: 1
    
# ============================================================================
# BLOCK - Test camera commands during trials
# ============================================================================
block:
  conditions:
    - id: "Start recording"
      commands:
        # Test disable logging
        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "startRecording"
          params:
            filename: 'bias_test.avi'

        - type: "wait"
          duration: 10

        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "stopRecording"

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "stopCapture"

    - id: "Start recording again"
      commands:
        # Test disable logging
        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "startRecording"
          params:
            filename: 'bias_test2.avi'

        - type: "wait"
          duration: 10

        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "stopRecording"

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "bias_camera"
          command_name: "stopCapture"



# ============================================================================
# INTERTRIAL - Test timestamp logging
# ============================================================================
intertrial:
  include: false
  commands:
    # Test getTimestamp command
    - type: "plugin"
      plugin_name: "bias_camera"
      command_name: "getTimestamp" #UNSURE IF THIS COMMAND IS AVAILABLE IN BIASCONTROL - IF NOT, DISABLE INTERTRIAL
    
    - type: "wait"
      duration: 1

# ============================================================================
# POSTTRIAL - Test cleanup
# ============================================================================
posttrial:
  include: false
  commands:
    # Final timestamp
    - type: "plugin"
      plugin_name: "bias_camera"
      command_name: "getTimestamp" #UNSURE IF THIS COMMAND IS AVAILABLE IN BIASCONTROL - IF NOT, DISABLE POSTTRIAL

    - type: "wait"
      duration: 1
